version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: gallery-backend:latest
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    volumes:
      - gallery-uploads:/app/uploads
      - ./backend/gallery.db:/app/gallery.db
      - ./backend/oauth_credentials.json:/app/oauth_credentials.json
      - ./backend/token.json:/app/token.json
    networks:
      - public-traefik
      - gallery-internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=public-traefik"

      # API HTTPS Router
      - 'traefik.http.routers.gallery-backend.rule=Host(`${DOMAIN:-gallery.example.com}`) && (PathPrefix(`/auth`) || PathPrefix(`/albums`) || PathPrefix(`/photos`) || PathPrefix(`/share`) || PathPrefix(`/docs`) || PathPrefix(`/redoc`) || PathPrefix(`/openapi.json`) || PathPrefix(`/healthz`) || PathPrefix(`/health`))'
      - "traefik.http.routers.gallery-backend.entrypoints=websecure"
      - "traefik.http.routers.gallery-backend.tls=true"
      - "traefik.http.routers.gallery-backend.tls.certresolver=le"
      - "traefik.http.routers.gallery-backend.priority=100"
      - "traefik.http.services.gallery-backend.loadbalancer.server.port=8000"

      # Health check configuration for Traefik
      - "traefik.http.services.gallery-backend.loadbalancer.healthcheck.path=/healthz"
      - "traefik.http.services.gallery-backend.loadbalancer.healthcheck.interval=10s"
      - "traefik.http.services.gallery-backend.loadbalancer.healthcheck.timeout=5s"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: gallery-frontend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    networks:
      - public-traefik
      - gallery-internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=public-traefik"

      # HTTP Router (Redirect to HTTPS)
      - 'traefik.http.routers.gallery-frontend-http.rule=Host(`${DOMAIN:-gallery.example.com}`)'
      - "traefik.http.routers.gallery-frontend-http.middlewares=gallery-redirect"
      - "traefik.http.middlewares.gallery-redirect.redirectscheme.scheme=https"

      # HTTPS Router
      - 'traefik.http.routers.gallery-frontend.rule=Host(`${DOMAIN:-gallery.example.com}`)'
      - "traefik.http.routers.gallery-frontend.entrypoints=websecure"
      - "traefik.http.routers.gallery-frontend.tls=true"
      - "traefik.http.routers.gallery-frontend.tls.certresolver=le"
      - "traefik.http.routers.gallery-frontend.priority=1"
      - "traefik.http.services.gallery-frontend.loadbalancer.server.port=80"

networks:
  public-traefik:
    external: true

  gallery-internal:
    driver: bridge

volumes:
  gallery-uploads:
    driver: local
